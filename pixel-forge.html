<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL_FORGE // v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void:#030008; --bg-base:#0a0514; --bg-panel:#0f0a1e; --bg-card:#150d28;
  --bg-header:#09061a; --bg-nav:#07041a; --bg-input:#0c0820;
  --accent-primary:#00ffcc; --accent-secondary:#ff4dd2; --accent-tertiary:#ffe600; --accent-dim:#006655;
  --text-body:#c0b8d4; --text-muted:#6a607a;
  --font-display:'VT323','Courier New',monospace;
  --font-body:'Share Tech Mono','Lucida Console',monospace;
  --gap-sm:8px; --gap-md:16px; --gap-lg:24px;
  --glow-mint:0 0 6px #00ffcc88,0 0 14px #00ffcc44;
  --glow-pink:0 0 6px #ff4dd288,0 0 14px #ff4dd244;
  --glow-text:0 0 8px #00ffcccc;
  --border-bright:1px solid #00ffcc; --border-dim:1px solid #006655; --border-pink:1px solid #ff4dd2;
  --transition:0.15s ease;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overflow:hidden; }
body {
  background:var(--bg-base); color:var(--text-body); font-family:var(--font-body);
  font-size:13px; line-height:1.5; display:flex; flex-direction:column;
  background-image:
    radial-gradient(circle at 50% 0%,#1a0040 0%,transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,204,.012) 3px,rgba(0,255,204,.012) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,255,204,.012) 3px,rgba(0,255,204,.012) 4px);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
}
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg-void); }
::-webkit-scrollbar-thumb { background:var(--accent-dim); }
::-webkit-scrollbar-thumb:hover { background:var(--accent-primary); }
.blink { animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* HEADER */
#header {
  flex-shrink:0; background:var(--bg-header);
  background-image:
    repeating-linear-gradient(135deg,transparent 0,transparent 20px,rgba(0,255,204,.025) 20px,rgba(0,255,204,.025) 21px),
    radial-gradient(ellipse at 25% 50%,#1a003a 0%,transparent 65%),
    radial-gradient(ellipse at 75% 50%,#003322 0%,transparent 60%);
  border-bottom:2px solid var(--accent-primary);
  padding:8px var(--gap-lg); display:flex; align-items:center; justify-content:space-between;
  position:relative; overflow:hidden;
}
#header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(to right,transparent,var(--accent-primary),var(--accent-secondary),var(--accent-primary),transparent);
  box-shadow:var(--glow-mint);
}
.header-brand h1 { font-family:var(--font-display); font-size:1.9rem; color:var(--accent-primary); text-shadow:var(--glow-text); letter-spacing:4px; line-height:1; }
.header-brand p  { font-size:.62rem; color:var(--accent-secondary); letter-spacing:3px; margin-top:2px; text-transform:uppercase; }
.header-actions  { display:flex; gap:var(--gap-sm); align-items:center; flex-wrap:wrap; }

/* MAIN LAYOUT */
#main { flex:1; display:flex; overflow:hidden; min-height:0; }

/* LEFT TOOLBAR */
#tool-panel {
  width:52px; min-width:52px; background:var(--bg-panel); border-right:var(--border-bright);
  display:flex; flex-direction:column; align-items:center; padding:6px 4px; gap:4px; overflow-y:auto;
}
.tool-btn {
  width:38px; height:38px; background:var(--bg-card); border:var(--border-dim);
  color:var(--text-muted); cursor:pointer; font-size:1.2rem;
  display:flex; align-items:center; justify-content:center;
  transition:all var(--transition);
}
.tool-btn:hover  { border-color:var(--accent-primary); color:var(--accent-primary); box-shadow:var(--glow-mint); }
.tool-btn.active { border-color:var(--accent-primary); background:rgba(0,255,204,.1); color:var(--accent-primary); box-shadow:var(--glow-mint); }
.tool-sep  { width:30px; height:1px; background:var(--accent-dim); margin:2px 0; }
.tool-label { font-size:.55rem; color:var(--text-muted); letter-spacing:.5px; margin-top:-2px; text-align:center; font-family:var(--font-display); }

/* CANVAS AREA */
#canvas-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  background:var(--bg-void); overflow:auto; position:relative;
  /* checkerboard transparency pattern */
  background-image:
    repeating-linear-gradient(45deg,#080010 25%,transparent 25%,transparent 75%,#080010 75%),
    repeating-linear-gradient(45deg,#080010 25%,#0a0514 25%,#0a0514 75%,#080010 75%);
  background-size:16px 16px; background-position:0 0,8px 8px;
  min-height:0;
}
#canvas-container {
  position:relative; display:inline-block; flex-shrink:0;
  box-shadow:var(--glow-mint),0 0 40px rgba(0,255,204,.1);
  border:1px solid var(--accent-dim);
}
/* pixel-canvas: logical size = COLS×ROWS, CSS size = COLS*ZOOM × ROWS*ZOOM */
#pixel-canvas  { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
/* grid-canvas and cursor-canvas: CSS size = pixel-canvas CSS size, buffer = COLS*ZOOM × ROWS*ZOOM */
#grid-canvas   { position:absolute; top:0; left:0; pointer-events:none; display:block; }
#cursor-canvas { position:absolute; top:0; left:0; display:block; cursor:crosshair; }

/* INDICATORS */
#zoom-indicator {
  position:absolute; bottom:var(--gap-md); left:50%; transform:translateX(-50%);
  background:rgba(9,6,26,.85); border:var(--border-dim);
  color:var(--accent-primary); font-family:var(--font-display); font-size:.9rem;
  padding:3px 10px; letter-spacing:2px; pointer-events:none; z-index:10;
}
#coord-indicator {
  position:absolute; top:var(--gap-sm); left:var(--gap-sm);
  background:rgba(9,6,26,.85); border:var(--border-dim);
  color:var(--accent-primary); font-family:var(--font-display); font-size:.85rem;
  padding:2px 8px; letter-spacing:2px; pointer-events:none; z-index:10;
}

/* RIGHT PANEL */
#right-panel {
  width:200px; min-width:200px; background:var(--bg-panel); border-left:var(--border-bright);
  display:flex; flex-direction:column; overflow:hidden;
}
.rp-section  { padding:var(--gap-sm); border-bottom:var(--border-dim); flex-shrink:0; }
.rp-title    { font-family:var(--font-display); font-size:.9rem; color:var(--accent-secondary); letter-spacing:2px; margin-bottom:6px; }
.rp-title-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }

/* COLOR */
#color-display {
  width:100%; height:48px; border:var(--border-bright); margin-bottom:6px; cursor:pointer;
  box-shadow:var(--glow-mint);
}
.color-row { display:flex; gap:4px; align-items:center; margin-bottom:4px; }
.color-hex {
  flex:1; background:var(--bg-input); border:var(--border-dim); color:var(--accent-primary);
  font-family:var(--font-body); font-size:.75rem; padding:3px 6px; outline:none;
  letter-spacing:1px; width:0; transition:border-color var(--transition);
}
.color-hex:focus { border-color:var(--accent-primary); }
#native-color { opacity:0; width:0; height:0; position:absolute; }

.opacity-row { display:flex; align-items:center; gap:4px; font-size:.7rem; color:var(--text-muted); }
.opacity-row input[type=range] { flex:1; -webkit-appearance:none; height:4px; background:var(--bg-card); border:var(--border-dim); outline:none; cursor:pointer; }
.opacity-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; background:var(--accent-primary); cursor:pointer; }
.opacity-val { color:var(--accent-primary); min-width:26px; text-align:right; }

/* SWATCHES */
#swatch-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-top:2px; }
.swatch {
  aspect-ratio:1; border:1px solid rgba(0,255,204,.2); cursor:pointer;
  transition:transform var(--transition),box-shadow var(--transition);
}
.swatch:hover    { transform:scale(1.2); box-shadow:var(--glow-mint); z-index:1; }
.swatch.selected { border:2px solid var(--accent-primary); box-shadow:var(--glow-mint); }

/* PALETTE */
#palette-wrap { flex:1; overflow-y:auto; padding:var(--gap-sm); }
#palette-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; }
.pal-swatch {
  aspect-ratio:1; border:1px solid rgba(0,255,204,.15); cursor:pointer;
  transition:transform var(--transition),box-shadow var(--transition);
}
.pal-swatch:hover { transform:scale(1.15); box-shadow:var(--glow-mint); z-index:1; }
.pal-swatch.active-color { border:2px solid var(--accent-primary); }
.pal-add { display:flex; align-items:center; justify-content:center; color:var(--accent-dim); font-size:1rem; background:var(--bg-card); }
.pal-add:hover { color:var(--accent-primary); border-color:var(--accent-primary); }

/* CANVAS SIZE */
.num-input { background:var(--bg-input); border:var(--border-dim); color:var(--text-body); font-family:var(--font-body); font-size:.75rem; padding:3px 6px; outline:none; width:50px; text-align:center; }
.num-input:focus { border-color:var(--accent-primary); }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:4px; background:transparent; border:var(--border-bright); color:var(--accent-primary); padding:4px 10px; font-family:var(--font-display); font-size:.9rem; letter-spacing:1px; cursor:pointer; transition:background var(--transition),box-shadow var(--transition); }
.btn:hover { background:var(--accent-primary); color:var(--bg-void); box-shadow:var(--glow-mint); }
.btn-pink  { border-color:var(--accent-secondary); color:var(--accent-secondary); }
.btn-pink:hover  { background:var(--accent-secondary); color:var(--bg-void); box-shadow:var(--glow-pink); }
.btn-sm    { padding:2px 7px; font-size:.78rem; }
.btn-yellow { border-color:var(--accent-tertiary); color:var(--accent-tertiary); }
.btn-yellow:hover { background:var(--accent-tertiary); color:var(--bg-void); }

/* MODAL */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(3,0,8,.9); z-index:1000; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--bg-panel); border:var(--border-bright); box-shadow:var(--glow-mint); padding:var(--gap-lg); max-width:360px; width:90%; }
#modal h2 { font-family:var(--font-display); font-size:1.4rem; color:var(--accent-primary); letter-spacing:2px; margin-bottom:var(--gap-md); text-shadow:var(--glow-text); }
.modal-row { display:flex; flex-direction:column; gap:4px; margin-bottom:var(--gap-sm); }
.modal-label { font-size:.8rem; color:var(--accent-primary); letter-spacing:1px; font-family:var(--font-display); }
.modal-actions { display:flex; gap:var(--gap-sm); justify-content:flex-end; margin-top:var(--gap-md); }

/* TOAST */
#toast { position:fixed; bottom:20px; right:220px; background:var(--bg-card); border:var(--border-bright); box-shadow:var(--glow-mint); color:var(--accent-primary); font-family:var(--font-display); font-size:1rem; letter-spacing:1px; padding:8px 16px; z-index:9000; opacity:0; transform:translateY(8px); transition:opacity .2s,transform .2s; pointer-events:none; }
#toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div id="header">
  <div class="header-brand">
    <h1>PIXEL_FORGE<span class="blink">_</span></h1>
    <p>// retro pixel art editor // v1.0</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="openNewCanvasModal()">⊞ NEW</button>
    <button class="btn btn-sm" onclick="undo()">↺ UNDO</button>
    <button class="btn btn-sm" onclick="redo()">↻ REDO</button>
    <button class="btn btn-sm btn-yellow" onclick="toggleGrid()">⊞ GRID</button>
    <input type="text" id="export-name" value="pixel-art"
      style="background:var(--bg-input);border:var(--border-dim);color:var(--accent-primary);
      font-family:var(--font-body);font-size:.75rem;padding:3px 7px;outline:none;
      width:100px;letter-spacing:1px;"
      title="Filename (no extension)">
    <select id="export-format"
      style="background:var(--bg-input);border:var(--border-dim);color:var(--accent-primary);
      font-family:var(--font-body);font-size:.75rem;padding:3px 5px;outline:none;">
      <option value="image/png">PNG</option>
      <option value="image/webp">WEBP</option>
      <option value="image/jpeg">JPEG</option>
    </select>
    <button class="btn btn-sm btn-pink" onclick="exportPNG(false)">⬇ EXPORT</button>
    <button class="btn btn-sm btn-pink" onclick="exportPNG(true)">⬇ ×8</button>
    <button class="btn btn-sm" onclick="clearCanvas()">✕ CLEAR</button>
  </div>
</div>

<div id="main">

  <!-- TOOL PANEL -->
  <div id="tool-panel">
    <button class="tool-btn active" data-tool="pencil" onclick="setTool('pencil')" title="Pencil (P)">✏</button>
    <span class="tool-label">PEN</span>
    <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')" title="Eraser (E)">◻</button>
    <span class="tool-label">ERASE</span>
    <button class="tool-btn" data-tool="fill" onclick="setTool('fill')" title="Fill (F)">◈</button>
    <span class="tool-label">FILL</span>
    <button class="tool-btn" data-tool="eyedrop" onclick="setTool('eyedrop')" title="Eyedropper (I)">🔬</button>
    <span class="tool-label">PICK</span>
    <button class="tool-btn" data-tool="line" onclick="setTool('line')" title="Line (L)">╱</button>
    <span class="tool-label">LINE</span>
    <button class="tool-btn" data-tool="rect" onclick="setTool('rect')" title="Rectangle (R)">▭</button>
    <span class="tool-label">RECT</span>
    <button class="tool-btn" data-tool="circle" onclick="setTool('circle')" title="Circle (C)">○</button>
    <span class="tool-label">CIRC</span>
    <div class="tool-sep"></div>
    <span class="tool-label" style="font-size:.6rem;color:var(--accent-dim);">SIZE</span>
    <button class="tool-btn" id="b1" onclick="setBrush(1)" title="1px">1</button>
    <button class="tool-btn" id="b2" onclick="setBrush(2)" title="2px">2</button>
    <button class="tool-btn" id="b4" onclick="setBrush(4)" title="4px">4</button>
    <button class="tool-btn" id="b8" onclick="setBrush(8)" title="8px">8</button>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-wrap">
    <div id="canvas-container">
      <canvas id="pixel-canvas"></canvas>
      <canvas id="grid-canvas"></canvas>
      <canvas id="cursor-canvas"></canvas>
    </div>
    <div id="zoom-indicator">1x</div>
    <div id="coord-indicator">X:— Y:—</div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">

    <div class="rp-section">
      <div class="rp-title">// COLOR</div>
      <canvas id="color-display" width="176" height="48" onclick="openNativePicker()"></canvas>
      <input type="color" id="native-color" oninput="onNativeColorChange(this.value)">
      <div class="color-row">
        <input type="text" class="color-hex" id="hex-input" value="#00ffcc" maxlength="7"
          oninput="onHexInput(this.value)" placeholder="#rrggbb">
        <button class="btn btn-sm" onclick="swapColors()" title="Swap FG/BG">⇄</button>
      </div>
      <div class="opacity-row">
        OPA
        <input type="range" id="opacity-slider" min="0" max="255" value="255" oninput="onOpacityChange(this.value)">
        <span class="opacity-val" id="opacity-val">255</span>
      </div>
    </div>

    <div class="rp-section">
      <div class="rp-title">// SWATCHES</div>
      <div id="swatch-grid"></div>
    </div>

    <div id="palette-wrap">
      <div class="rp-title-row">
        <span class="rp-title">// PALETTE</span>
        <div style="display:flex;gap:3px;">
          <button class="btn btn-sm" onclick="loadPalette('pico8')" title="PICO-8">P8</button>
          <button class="btn btn-sm" onclick="loadPalette('gb')"    title="GameBoy">GB</button>
          <button class="btn btn-sm" onclick="loadPalette('cga')"   title="CGA">CG</button>
          <button class="btn btn-sm" onclick="loadPalette('nes')"   title="NES">NS</button>
        </div>
      </div>
      <div id="palette-grid"></div>
    </div>

    <div class="rp-section">
      <div class="rp-title">// CANVAS</div>
      <div style="display:flex;gap:4px;align-items:center;font-size:.7rem;color:var(--text-muted);">
        <input type="number" class="num-input" id="cv-w" value="32" min="1" max="256">
        ×
        <input type="number" class="num-input" id="cv-h" value="32" min="1" max="256">
        <button class="btn btn-sm" onclick="resizeCanvas()">SET</button>
      </div>
      <div style="margin-top:6px;font-size:.65rem;color:var(--text-muted);" id="canvas-info">32 × 32 px</div>
    </div>

  </div>
</div>

<!-- NEW CANVAS MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2>NEW CANVAS</h2>
    <div class="modal-row">
      <label class="modal-label">WIDTH (px)</label>
      <input type="number" class="num-input" id="m-w" value="32" min="1" max="256" style="width:100%;">
    </div>
    <div class="modal-row">
      <label class="modal-label">HEIGHT (px)</label>
      <input type="number" class="num-input" id="m-h" value="32" min="1" max="256" style="width:100%;">
    </div>
    <div class="modal-row">
      <label class="modal-label">BACKGROUND</label>
      <select class="num-input" id="m-bg" style="width:100%;text-align:left;">
        <option value="transparent">Transparent</option>
        <option value="black">Black</option>
        <option value="white">White</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-sm" onclick="createNewCanvas()">CREATE</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
let COLS = 32, ROWS = 32, ZOOM = 1;
let tool      = 'pencil';
let brushSize = 1;
let fgColor   = '#00ffcc';
let bgColor   = '#030008';
let opacity   = 255;
let showGrid  = true;
let isDrawing = false;
let lastX = -1, lastY = -1;
let lineStart        = null;
let snapshotBeforeDrag = null;
let undoStack = [], redoStack = [];
const MAX_UNDO = 40;

const pixelCanvas  = document.getElementById('pixel-canvas');
const gridCanvas   = document.getElementById('grid-canvas');
const cursorCanvas = document.getElementById('cursor-canvas');
const ctx  = pixelCanvas.getContext('2d');
const gCtx = gridCanvas.getContext('2d');
const cCtx = cursorCanvas.getContext('2d');

// ============================================================
// PALETTES
// ============================================================
const PALETTES = {
  pico8: ['#000000','#1D2B53','#7E2553','#008751','#AB5236','#5F574F','#C2C3C7','#FFF1E8',
          '#FF004D','#FFA300','#FFEC27','#00E436','#29ADFF','#83769C','#FF77A8','#FFCCAA'],
  gb:    ['#0f380f','#306230','#8bac0f','#9bbc0f'],
  cga:   ['#000000','#0000AA','#00AA00','#00AAAA','#AA0000','#AA00AA','#AA5500','#AAAAAA',
          '#555555','#5555FF','#55FF55','#55FFFF','#FF5555','#FF55FF','#FFFF55','#FFFFFF'],
  nes:   ['#7C7C7C','#0000FC','#0000BC','#4428BC','#940084','#A80020','#A81000','#881400',
          '#503000','#007800','#006800','#005800','#004058','#000000','#000000','#000000',
          '#BCBCBC','#0078F8','#0058F8','#6844FC','#D800CC','#E40058','#F83800','#E45C10',
          '#AC7C00','#00B800','#00A800','#00A844','#008888','#000000','#F8F8F8','#3CBCFC',
          '#6888FC','#9878F8','#F878F8','#F85898','#F87858','#FCA044','#F8B800','#B8F818',
          '#58D854','#58F898','#00E8D8','#787878','#000000','#FCFCFC','#A4E4FC','#B8B8F8',
          '#D8B8F8','#F8B8F8','#F8A4C0','#F0D0B0','#FCE0A8','#F8D878','#D8F878','#B8F8B8',
          '#B8F8D8','#00FCFC','#F8D8F8','#000000'],
};

const DEFAULT_SWATCHES = [
  '#030008','#0a0514','#150d28','#00ffcc','#ff4dd2','#ffe600','#006655','#c0b8d4',
  '#6a607a','#ffffff','#ff3333','#3388ff','#ff8833','#33ff88','#cc33ff','#ffcc00',
  '#00ccff','#ff66cc','#66ff66','#ff6666'
];

let palette = [...PALETTES.pico8];

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // ZOOM starts at 1 so initCanvas doesn't use a zero clientWidth
  ZOOM = 1;
  initCanvas(32, 32, 'transparent');
  renderSwatches();
  renderPalette();
  updateColorDisplay();
  setBrush(1);
  setupCanvasEvents();
  setupKeyboard();

  // autoZoom runs AFTER the first paint so canvas-wrap has real dimensions
  requestAnimationFrame(() => { autoZoom(); });
});

// ============================================================
// CANVAS INIT
// ============================================================
function initCanvas(w, h, bg) {
  COLS = w; ROWS = h;

  // pixel-canvas: logical resolution is COLS×ROWS
  pixelCanvas.width  = COLS;
  pixelCanvas.height = ROWS;

  // CSS display size and overlay canvas buffer sizes are set by setZoom/autoZoom
  // Call applyZoomSizes to sync everything to current ZOOM
  applyZoomSizes();

  ctx.clearRect(0, 0, COLS, ROWS);
  if (bg === 'black')       { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, COLS, ROWS); }
  else if (bg === 'white')  { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, COLS, ROWS); }

  undoStack = []; redoStack = [];
  drawGrid();
  document.getElementById('canvas-info').textContent = `${COLS} × ${ROWS} px`;
  document.getElementById('cv-w').value = COLS;
  document.getElementById('cv-h').value = ROWS;
}

// Applies current ZOOM to all three canvases
function applyZoomSizes() {
  const pxW = COLS * ZOOM;
  const pxH = ROWS * ZOOM;
  // pixel-canvas: only CSS size changes (logical size stays COLS×ROWS)
  pixelCanvas.style.width  = pxW + 'px';
  pixelCanvas.style.height = pxH + 'px';
  // overlay canvases: buffer = CSS size = COLS*ZOOM × ROWS*ZOOM
  gridCanvas.width   = pxW;  gridCanvas.height   = pxH;
  cursorCanvas.width = pxW;  cursorCanvas.height = pxH;
  document.getElementById('zoom-indicator').textContent = ZOOM + 'x';
}

function autoZoom() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth  - 40;
  const maxH = wrap.clientHeight - 40;
  if (maxW <= 0 || maxH <= 0) return;
  const zw = Math.floor(maxW / COLS);
  const zh = Math.floor(maxH / ROWS);
  setZoom(Math.max(1, Math.min(zw, zh, 32)));
}

function setZoom(z) {
  ZOOM = z;
  applyZoomSizes();
  drawGrid();
}

// ============================================================
// GRID
// ============================================================
function drawGrid() {
  gCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  if (!showGrid || ZOOM < 4) return;
  gCtx.strokeStyle = 'rgba(0,255,204,0.12)';
  gCtx.lineWidth   = 0.5;
  for (let x = 0; x <= COLS; x++) {
    gCtx.beginPath(); gCtx.moveTo(x * ZOOM, 0); gCtx.lineTo(x * ZOOM, ROWS * ZOOM); gCtx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    gCtx.beginPath(); gCtx.moveTo(0, y * ZOOM); gCtx.lineTo(COLS * ZOOM, y * ZOOM); gCtx.stroke();
  }
}

function toggleGrid() {
  showGrid = !showGrid;
  drawGrid();
  showToast(showGrid ? 'GRID ON' : 'GRID OFF');
}

// ============================================================
// EVENTS
// ============================================================
function setupCanvasEvents() {
  const cc = cursorCanvas;

  cc.addEventListener('mousedown', e => {
    e.preventDefault();
    isDrawing = true;
    handleDraw(e, true);
  });

  cc.addEventListener('mousemove', e => {
    handleMove(e);
    if (isDrawing) handleDraw(e, false);
  });

  cc.addEventListener('mouseup', e => {
    handleUp(e);
  });

  cc.addEventListener('mouseleave', () => {
    // Clear cursor highlight but don't stop drawing —
    // window mouseup handles the actual stop
    cCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
    lastX = -1; lastY = -1;
  });

  // Stop drawing if mouse is released anywhere, even outside canvas
  window.addEventListener('mouseup', () => {
    if (!isDrawing) return;
    isDrawing = false;
    // Discard any in-progress shape
    lineStart          = null;
    snapshotBeforeDrag = null;
    lastX = -1; lastY = -1;
  });

  cc.addEventListener('wheel', e => {
    e.preventDefault();
    setZoom(Math.max(1, Math.min(ZOOM + (e.deltaY < 0 ? 1 : -1), 32)));
    drawGrid();
  }, { passive: false });

  // Right-click = eyedropper
  cc.addEventListener('contextmenu', e => { e.preventDefault(); pickColorAt(e); });
}

// Convert mouse event to pixel coordinates on the logical canvas
function getPixelCoords(e) {
  const rect   = cursorCanvas.getBoundingClientRect();
  // scaleX = cursorCanvas.width (buffer px) / rect.width (CSS px) = ZOOM / 1 ... then / ZOOM = 1
  // Simplified: just divide CSS offset by ZOOM
  const px = Math.floor((e.clientX - rect.left)  / ZOOM);
  const py = Math.floor((e.clientY - rect.top)   / ZOOM);
  return [px, py];
}

function handleMove(e) {
  const [px, py] = getPixelCoords(e);
  document.getElementById('coord-indicator').textContent = `X:${px} Y:${py}`;

  cCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);
  cCtx.fillStyle = 'rgba(0,255,204,0.35)';

  if (tool === 'pencil' || tool === 'eraser') {
    for (let dy = 0; dy < brushSize; dy++) {
      for (let dx = 0; dx < brushSize; dx++) {
        const bx = px + dx, by = py + dy;
        if (bx >= 0 && bx < COLS && by >= 0 && by < ROWS)
          cCtx.fillRect(bx * ZOOM, by * ZOOM, ZOOM, ZOOM);
      }
    }
  } else {
    if (px >= 0 && px < COLS && py >= 0 && py < ROWS)
      cCtx.fillRect(px * ZOOM, py * ZOOM, ZOOM, ZOOM);
  }
}

function handleDraw(e, isFirst) {
  const [px, py] = getPixelCoords(e);
  if (px < 0 || px >= COLS || py < 0 || py >= ROWS) return;

  if (tool === 'eyedrop') { pickColorAt(e); return; }

  if (tool === 'fill') {
    if (isFirst) { pushUndo(); floodFill(px, py); }
    return;
  }

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    if (isFirst) {
      lineStart          = { x: px, y: py };
      snapshotBeforeDrag = ctx.getImageData(0, 0, COLS, ROWS);
    } else if (lineStart) {
      ctx.putImageData(snapshotBeforeDrag, 0, 0);
      drawShape(lineStart.x, lineStart.y, px, py);
    }
    return;
  }

  // Pencil / eraser
  if (isFirst) {
    pushUndo();
    lastX = px; lastY = py;
    paintAt(px, py);
  } else {
    bresenham(lastX, lastY, px, py, paintAt);
    lastX = px; lastY = py;
  }
}

function handleUp(e) {
  if (!isDrawing) return;
  const [px, py] = getPixelCoords(e);

  if ((tool === 'line' || tool === 'rect' || tool === 'circle') && lineStart) {
    if (snapshotBeforeDrag) ctx.putImageData(snapshotBeforeDrag, 0, 0);
    pushUndo();
    drawShape(lineStart.x, lineStart.y, px, py);
    lineStart          = null;
    snapshotBeforeDrag = null;
  }

  isDrawing = false;
  lastX = -1; lastY = -1;
}

// ============================================================
// DRAW OPERATIONS
// ============================================================
function paintAt(px, py) {
  for (let dy = 0; dy < brushSize; dy++) {
    for (let dx = 0; dx < brushSize; dx++) {
      const bx = px + dx, by = py + dy;
      if (bx < 0 || bx >= COLS || by < 0 || by >= ROWS) continue;
      if (tool === 'eraser') {
        ctx.clearRect(bx, by, 1, 1);
      } else {
        ctx.fillStyle = hexOpacity(fgColor, opacity);
        ctx.fillRect(bx, by, 1, 1);
      }
    }
  }
}

function drawShape(x0, y0, x1, y1) {
  const col = (tool === 'eraser') ? null : hexOpacity(fgColor, opacity);

  const plot = (x, y) => {
    if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
    if (col) { ctx.fillStyle = col; ctx.fillRect(x, y, 1, 1); }
    else ctx.clearRect(x, y, 1, 1);
  };

  if (tool === 'line') {
    bresenham(x0, y0, x1, y1, plot);
  } else if (tool === 'rect') {
    const mnx = Math.min(x0, x1), mny = Math.min(y0, y1);
    const mxx = Math.max(x0, x1), mxy = Math.max(y0, y1);
    for (let x = mnx; x <= mxx; x++) {
      for (let y = mny; y <= mxy; y++) {
        if (x === mnx || x === mxx || y === mny || y === mxy) plot(x, y);
      }
    }
  } else if (tool === 'circle') {
    bresenhamCircle(x0, y0, x1, y1, plot);
  }
}

function bresenham(x0, y0, x1, y1, cb) {
  let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1, err = dx - dy;
  while (true) {
    cb(x0, y0);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 <  dx) { err += dx; y0 += sy; }
  }
}

function bresenhamCircle(cx, cy, ex, ey, cb) {
  const r = Math.round(Math.sqrt((ex - cx) ** 2 + (ey - cy) ** 2));
  if (r === 0) { cb(cx, cy); return; }
  let x = 0, y = r, d = 3 - 2 * r;
  const pts = (px, py) => {
    cb(cx + px, cy + py); cb(cx - px, cy + py);
    cb(cx + px, cy - py); cb(cx - px, cy - py);
    cb(cx + py, cy + px); cb(cx - py, cy + px);
    cb(cx + py, cy - px); cb(cx - py, cy - px);
  };
  pts(x, y);
  while (y >= x) {
    x++;
    if (d > 0) { y--; d += 4 * (x - y) + 10; } else { d += 4 * x + 6; }
    pts(x, y);
  }
}

function floodFill(x, y) {
  const imgData = ctx.getImageData(0, 0, COLS, ROWS);
  const data    = imgData.data;
  const idx     = (y * COLS + x) * 4;
  const tr = data[idx], tg = data[idx + 1], tb = data[idx + 2], ta = data[idx + 3];
  const fc = hexToRgb(fgColor);
  if (!fc) return;
  const fa = opacity;
  // Don't fill if target already matches fg
  if (tr === fc.r && tg === fc.g && tb === fc.b && ta === fa) return;

  const stack   = [[x, y]];
  const visited = new Uint8Array(COLS * ROWS);
  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS) continue;
    const ci = (cy * COLS + cx) * 4;
    if (visited[cy * COLS + cx]) continue;
    if (data[ci] !== tr || data[ci+1] !== tg || data[ci+2] !== tb || data[ci+3] !== ta) continue;
    visited[cy * COLS + cx] = 1;
    data[ci] = fc.r; data[ci+1] = fc.g; data[ci+2] = fc.b; data[ci+3] = fa;
    stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
  }
  ctx.putImageData(imgData, 0, 0);
}

function pickColorAt(e) {
  const [px, py] = getPixelCoords(e);
  if (px < 0 || px >= COLS || py < 0 || py >= ROWS) return;
  const d = ctx.getImageData(px, py, 1, 1).data;
  if (d[3] === 0) return; // transparent — ignore
  const hex = '#' + [d[0], d[1], d[2]].map(v => v.toString(16).padStart(2, '0')).join('');
  setFgColor(hex);
  opacity = d[3];
  document.getElementById('opacity-slider').value = opacity;
  document.getElementById('opacity-val').textContent = opacity;
  showToast('PICKED: ' + hex.toUpperCase());
}

// ============================================================
// UNDO / REDO
// ============================================================
function pushUndo() {
  undoStack.push(ctx.getImageData(0, 0, COLS, ROWS));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}
function undo() {
  if (!undoStack.length) { showToast('NOTHING TO UNDO'); return; }
  redoStack.push(ctx.getImageData(0, 0, COLS, ROWS));
  ctx.putImageData(undoStack.pop(), 0, 0);
}
function redo() {
  if (!redoStack.length) { showToast('NOTHING TO REDO'); return; }
  undoStack.push(ctx.getImageData(0, 0, COLS, ROWS));
  ctx.putImageData(redoStack.pop(), 0, 0);
}

// ============================================================
// TOOL / BRUSH
// ============================================================
function setTool(t) {
  tool = t;
  document.querySelectorAll('#tool-panel .tool-btn[data-tool]')
    .forEach(b => b.classList.toggle('active', b.dataset.tool === t));
}
function setBrush(s) {
  brushSize = s;
  [1, 2, 4, 8].forEach(n => {
    const el = document.getElementById('b' + n);
    if (el) el.classList.toggle('active', n === s);
  });
}

// ============================================================
// COLOR
// ============================================================
function setFgColor(hex) {
  fgColor = hex;
  document.getElementById('hex-input').value   = hex;
  document.getElementById('native-color').value = hex;
  updateColorDisplay();
  renderPalette(); // refresh active-color highlight
  renderSwatches();
}

function updateColorDisplay() {
  const c  = document.getElementById('color-display');
  const cx = c.getContext('2d');
  cx.clearRect(0, 0, c.width, c.height);
  // BG swatch (offset)
  cx.fillStyle = bgColor; cx.fillRect(8, 8, 40, 32);
  // FG swatch (front)
  cx.fillStyle = fgColor; cx.fillRect(0, 0, 48, 40);
  cx.strokeStyle = '#00ffcc'; cx.lineWidth = 1; cx.strokeRect(0, 0, 48, 40);
  cx.strokeStyle = '#006655';                   cx.strokeRect(8, 8, 40, 32);
}

function onNativeColorChange(val) { setFgColor(val); }
function openNativePicker()       { document.getElementById('native-color').click(); }
function onHexInput(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) setFgColor(val);
}
function swapColors() {
  [fgColor, bgColor] = [bgColor, fgColor];
  document.getElementById('hex-input').value = fgColor;
  updateColorDisplay();
}
function onOpacityChange(v) {
  opacity = parseInt(v);
  document.getElementById('opacity-val').textContent = opacity;
}

// ============================================================
// SWATCHES
// ============================================================
function renderSwatches() {
  document.getElementById('swatch-grid').innerHTML =
    DEFAULT_SWATCHES.map(c => `
      <div class="swatch ${c === fgColor ? 'selected' : ''}" style="background:${c};"
        onclick="setFgColor('${c}')" title="${c}"></div>`).join('');
}

// ============================================================
// PALETTE
// ============================================================
function loadPalette(name) {
  palette = [...PALETTES[name]];
  renderPalette();
  showToast(name.toUpperCase() + ' PALETTE LOADED');
}
function renderPalette() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = palette.map(c => `
    <div class="pal-swatch ${c === fgColor ? 'active-color' : ''}" style="background:${c};"
      onclick="setFgColor('${c}')" title="${c}"></div>`).join('');
  grid.innerHTML += `<div class="pal-swatch pal-add" onclick="addCurrentToPalette()" title="Add current color">+</div>`;
}
function addCurrentToPalette() {
  if (palette.includes(fgColor)) { showToast('ALREADY IN PALETTE'); return; }
  palette.push(fgColor);
  renderPalette();
  showToast('ADDED TO PALETTE');
}

// ============================================================
// CANVAS CONTROLS
// ============================================================
function clearCanvas() {
  if (!confirm('Clear the canvas?')) return;
  pushUndo();
  ctx.clearRect(0, 0, COLS, ROWS);
  showToast('CANVAS CLEARED');
}

function resizeCanvas() {
  const w = parseInt(document.getElementById('cv-w').value) || 32;
  const h = parseInt(document.getElementById('cv-h').value) || 32;
  if (w < 1 || w > 256 || h < 1 || h > 256) { showToast('SIZE: 1–256'); return; }
  // Preserve existing pixels
  const snap = ctx.getImageData(0, 0, COLS, ROWS);
  initCanvas(w, h, 'transparent');
  ctx.putImageData(snap, 0, 0);
  autoZoom();
  showToast(`CANVAS: ${w}×${h}`);
}

function openNewCanvasModal() { document.getElementById('modal-overlay').classList.add('open'); }

function createNewCanvas() {
  const w  = parseInt(document.getElementById('m-w').value) || 32;
  const h  = parseInt(document.getElementById('m-h').value) || 32;
  const bg = document.getElementById('m-bg').value;
  if (w < 1 || w > 256 || h < 1 || h > 256) { showToast('SIZE: 1–256'); return; }
  initCanvas(w, h, bg);
  autoZoom(); // layout already exists, this is safe
  closeModal();
  showToast(`NEW CANVAS: ${w}×${h}`);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ============================================================
// EXPORT
// ============================================================
function exportPNG(upscale) {
  const factor   = upscale ? 8 : 1;
  const mimeType = document.getElementById('export-format').value;
  const baseName = document.getElementById('export-name').value.trim() || 'pixel-art';
  const extMap   = { 'image/png': 'png', 'image/webp': 'webp', 'image/jpeg': 'jpg' };
  const ext      = extMap[mimeType] || 'png';

  const exp  = document.createElement('canvas');
  exp.width  = COLS * factor;
  exp.height = ROWS * factor;
  const ectx = exp.getContext('2d');
  ectx.imageSmoothingEnabled = false;

  // JPEG doesn't support transparency — fill white first
  if (mimeType === 'image/jpeg') {
    ectx.fillStyle = '#ffffff';
    ectx.fillRect(0, 0, exp.width, exp.height);
  }

  ectx.drawImage(pixelCanvas, 0, 0, COLS * factor, ROWS * factor);

  const a    = document.createElement('a');
  a.href     = exp.toDataURL(mimeType, 0.95);
  a.download = baseName + (upscale ? '@8x' : '') + '.' + ext;
  a.click();
  showToast(`EXPORTED: ${a.download}`);
}

// ============================================================
// KEYBOARD
// ============================================================
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName.toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

    if (e.key === 'p' || e.key === 'P') setTool('pencil');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'f' || e.key === 'F') setTool('fill');
    if (e.key === 'i' || e.key === 'I') setTool('eyedrop');
    if (e.key === 'l' || e.key === 'L') setTool('line');
    if (e.key === 'r' || e.key === 'R') setTool('rect');
    if (e.key === 'c' || e.key === 'C') setTool('circle');
    if (e.key === 'g' || e.key === 'G') toggleGrid();
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportPNG(false); }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') { e.preventDefault(); exportPNG(true); }
    if (e.key === '+' || e.key === '=') setZoom(Math.min(ZOOM + 1, 32));
    if (e.key === '-')                  setZoom(Math.max(ZOOM - 1, 1));
    if (e.key === '1') setBrush(1);
    if (e.key === '2') setBrush(2);
    if (e.key === '3') setBrush(4);
    if (e.key === '4') setBrush(8);
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
}

// ============================================================
// UTILS
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return isNaN(r) ? null : { r, g, b };
}
function hexOpacity(hex, a) {
  const { r, g, b } = hexToRgb(hex) || { r: 0, g: 255, b: 204 };
  return `rgba(${r},${g},${b},${(a / 255).toFixed(3)})`;
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}
</script>
