<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME_BASE // App Binder</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void:        #030008;
  --bg-base:        #0a0514;
  --bg-panel:       #0f0a1e;
  --bg-card:        #150d28;
  --bg-header:      #09061a;
  --bg-nav:         #07041a;
  --bg-input:       #0c0820;
  --accent-primary:   #00ffcc;
  --accent-secondary: #ff4dd2;
  --accent-tertiary:  #ffe600;
  --accent-dim:       #006655;
  --text-body:     #c0b8d4;
  --text-muted:    #6a607a;
  --font-display:  'VT323', 'Courier New', monospace;
  --font-body:     'Share Tech Mono', 'Lucida Console', monospace;
  --gap-sm: 8px; --gap-md: 16px; --gap-lg: 24px;
  --glow-mint: 0 0 6px #00ffcc88, 0 0 14px #00ffcc44;
  --glow-pink: 0 0 6px #ff4dd288, 0 0 14px #ff4dd244;
  --glow-yellow: 0 0 6px #ffe60088, 0 0 14px #ffe60044;
  --glow-text: 0 0 8px #00ffcccc;
  --border-bright: 1px solid #00ffcc;
  --border-dim:    1px solid #006655;
  --border-pink:   1px solid #ff4dd2;
  --transition: 0.15s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background-color: var(--bg-base);
  color: var(--text-body);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 50% 0%, #1a0040 0%, transparent 55%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,204,.012) 3px, rgba(0,255,204,.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,255,204,.012) 3px, rgba(0,255,204,.012) 4px);
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 2px, rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px);
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg-void); }
::-webkit-scrollbar-thumb { background: var(--accent-dim); }
::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ============================================================
   HEADER
   ============================================================ */
#header {
  background: var(--bg-header);
  background-image:
    repeating-linear-gradient(135deg, transparent 0, transparent 20px, rgba(0,255,204,.025) 20px, rgba(0,255,204,.025) 21px),
    radial-gradient(ellipse at 25% 50%, #1a003a 0%, transparent 65%),
    radial-gradient(ellipse at 75% 50%, #003322 0%, transparent 60%);
  border-bottom: 2px solid var(--accent-primary);
  padding: 16px var(--gap-lg);
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
}
#header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent, var(--accent-primary), var(--accent-secondary), var(--accent-primary), transparent);
  box-shadow: var(--glow-mint);
}
.header-brand h1 {
  font-family: var(--font-display); font-size: 2.4rem;
  color: var(--accent-primary); text-shadow: var(--glow-text);
  letter-spacing: 4px; line-height: 1;
}
.header-brand p {
  font-size: .65rem; color: var(--accent-secondary);
  letter-spacing: 3px; margin-top: 3px; text-transform: uppercase;
}
.header-right { display: flex; align-items: center; gap: var(--gap-sm); }

/* ============================================================
   TOOLBAR
   ============================================================ */
#toolbar {
  background: var(--bg-nav);
  border-bottom: var(--border-bright);
  padding: 8px var(--gap-lg);
  display: flex; align-items: center; gap: var(--gap-sm); flex-wrap: wrap;
}

.tb-label {
  font-size: .7rem; color: var(--text-muted);
  letter-spacing: 1px; white-space: nowrap;
}

select.tb-select {
  background: var(--bg-input); border: var(--border-dim);
  color: var(--accent-primary); font-family: var(--font-body);
  font-size: .78rem; padding: 4px 8px; outline: none;
  cursor: pointer; transition: border-color var(--transition);
  max-width: 200px;
}
select.tb-select:focus { border-color: var(--accent-primary); box-shadow: var(--glow-mint); }
select.tb-select option { background: var(--bg-input); }

.tb-sep { width: 1px; height: 22px; background: var(--accent-dim); flex-shrink: 0; }

#sort-select {
  background: var(--bg-input); border: var(--border-dim);
  color: var(--text-muted); font-family: var(--font-body);
  font-size: .75rem; padding: 4px 6px; outline: none; cursor: pointer;
}
#sort-select:focus { border-color: var(--accent-primary); }
#sort-select option { background: var(--bg-input); }

/* ============================================================
   BINDER RINGS (decorative top strip)
   ============================================================ */
#binder-rings {
  background: var(--bg-panel);
  border-bottom: var(--border-dim);
  padding: 6px var(--gap-lg);
  display: flex; gap: 32px; align-items: center;
}
.ring {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--accent-dim);
  background: var(--bg-void);
  box-shadow: inset 0 0 4px rgba(0,255,204,.15);
  flex-shrink: 0;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
#content {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--gap-lg);
  width: 100%;
}

/* Section headers (tab dividers) */
.section-divider {
  display: flex; align-items: center; gap: var(--gap-md);
  margin: var(--gap-lg) 0 var(--gap-md);
}
.section-divider-label {
  font-family: var(--font-display);
  font-size: 1rem; color: var(--accent-tertiary);
  letter-spacing: 3px; white-space: nowrap;
  text-shadow: var(--glow-yellow);
}
.section-divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, var(--accent-dim), transparent);
}
.section-tab {
  background: var(--accent-tertiary);
  color: var(--bg-void);
  font-family: var(--font-display);
  font-size: .75rem; padding: 2px 10px;
  letter-spacing: 2px;
}

/* ============================================================
   APP GRID
   ============================================================ */
#app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--gap-lg);
}

/* ============================================================
   APP CARD
   ============================================================ */
.app-card {
  background: var(--bg-card);
  border: var(--border-dim);
  display: flex; flex-direction: column;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  position: relative;
  overflow: hidden;
}
.app-card:hover {
  border-color: var(--accent-primary);
  box-shadow: var(--glow-mint);
  transform: translateY(-2px);
}

/* coloured left tab — changes per category */
.app-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.app-card[data-cat="writing"]::before   { background: var(--accent-primary); }
.app-card[data-cat="media"]::before     { background: var(--accent-secondary); }
.app-card[data-cat="creative"]::before  { background: var(--accent-tertiary); }
.app-card[data-cat="utility"]::before   { background: #3388ff; }
.app-card[data-cat="custom"]::before    { background: #aa66ff; }

/* CARD HEADER */
.card-head {
  padding: var(--gap-md) var(--gap-md) var(--gap-sm) var(--gap-md);
  display: flex; align-items: flex-start; gap: var(--gap-sm);
  border-bottom: 1px solid rgba(0,255,204,.07);
}
.card-icon {
  font-size: 1.8rem; flex-shrink: 0; line-height: 1;
  margin-top: 2px;
}
.card-title-area { flex: 1; min-width: 0; }
.card-name {
  font-family: var(--font-display); font-size: 1.3rem;
  color: var(--accent-primary); letter-spacing: 2px;
  line-height: 1; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-version {
  font-size: .6rem; color: var(--text-muted); letter-spacing: 1px;
}
.card-cat-badge {
  font-size: .58rem; padding: 2px 6px; letter-spacing: 1px;
  border: 1px solid; flex-shrink: 0; align-self: flex-start; margin-top: 2px;
}
.badge-writing  { color: var(--accent-primary);   border-color: var(--accent-primary); }
.badge-media    { color: var(--accent-secondary); border-color: var(--accent-secondary); }
.badge-creative { color: var(--accent-tertiary);  border-color: var(--accent-tertiary); }
.badge-utility  { color: #3388ff; border-color: #3388ff; }
.badge-custom   { color: #aa66ff; border-color: #aa66ff; }

/* CARD BODY */
.card-body { padding: var(--gap-sm) var(--gap-md); flex: 1; }
.card-desc {
  font-size: .75rem; color: var(--text-muted);
  line-height: 1.6; min-height: 40px;
}

/* CARD TAGS */
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: var(--gap-sm); }
.card-tag {
  font-size: .6rem; padding: 1px 5px;
  background: var(--bg-panel); border: 1px solid var(--accent-dim);
  color: var(--text-muted); letter-spacing: .5px;
}

/* CARD FOOTER */
.card-foot {
  padding: var(--gap-sm) var(--gap-md);
  border-top: 1px solid rgba(0,255,204,.07);
  display: flex; align-items: center; gap: var(--gap-sm);
}
.card-path {
  font-size: .62rem; color: var(--text-muted);
  letter-spacing: .5px; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* LAUNCH BUTTON */
.card-launch {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; border: var(--border-bright);
  color: var(--accent-primary); font-family: var(--font-display);
  font-size: .9rem; letter-spacing: 1px; padding: 3px 12px;
  cursor: pointer; text-decoration: none; flex-shrink: 0;
  transition: background var(--transition), box-shadow var(--transition);
}
.app-card[data-cat="media"] .card-launch     { border-color: var(--accent-secondary); color: var(--accent-secondary); }
.app-card[data-cat="creative"] .card-launch  { border-color: var(--accent-tertiary);  color: var(--accent-tertiary); }
.app-card[data-cat="utility"] .card-launch   { border-color: #3388ff; color: #3388ff; }
.app-card[data-cat="custom"] .card-launch    { border-color: #aa66ff; color: #aa66ff; }

.card-launch:hover { box-shadow: var(--glow-mint); }
.app-card[data-cat="writing"] .card-launch:hover  { background: var(--accent-primary);   color: var(--bg-void); }
.app-card[data-cat="media"] .card-launch:hover    { background: var(--accent-secondary); color: var(--bg-void); box-shadow: var(--glow-pink); }
.app-card[data-cat="creative"] .card-launch:hover { background: var(--accent-tertiary);  color: var(--bg-void); box-shadow: var(--glow-yellow); }
.app-card[data-cat="utility"] .card-launch:hover  { background: #3388ff; color: #fff; box-shadow: 0 0 10px #3388ff88; }
.app-card[data-cat="custom"] .card-launch:hover   { background: #aa66ff; color: #fff; box-shadow: 0 0 10px #aa66ff88; }

/* EDIT / DELETE icons */
.card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.card-icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: .85rem; padding: 3px 5px;
  transition: color var(--transition);
}
.card-icon-btn:hover { color: var(--accent-primary); }
.card-icon-btn.del:hover { color: #ff3333; }

/* ============================================================
   EMPTY STATE
   ============================================================ */
#empty-state {
  display: none;
  text-align: center; padding: 60px var(--gap-lg);
  color: var(--text-muted); grid-column: 1 / -1;
}
#empty-state .big { font-family: var(--font-display); font-size: 3rem; color: var(--accent-dim); display: block; margin-bottom: var(--gap-md); }
#empty-state p { font-size: .8rem; letter-spacing: 1px; line-height: 1.8; }

/* ============================================================
   MODAL
   ============================================================ */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(3,0,8,.9); z-index: 1000;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--bg-panel); border: var(--border-bright);
  box-shadow: var(--glow-mint); padding: var(--gap-lg);
  width: 480px; max-width: 94vw; max-height: 90vh; overflow-y: auto;
}
#modal h2 {
  font-family: var(--font-display); font-size: 1.5rem;
  color: var(--accent-primary); letter-spacing: 2px;
  margin-bottom: var(--gap-md); text-shadow: var(--glow-text);
}

.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: var(--gap-sm); }
.form-label { font-size: .8rem; color: var(--accent-primary); letter-spacing: 1px; font-family: var(--font-display); font-size: .95rem; }
.form-hint  { font-size: .65rem; color: var(--text-muted); letter-spacing: .5px; }

.form-input, .form-select, .form-textarea {
  background: var(--bg-input); border: var(--border-dim);
  color: var(--text-body); font-family: var(--font-body);
  font-size: 12px; padding: 6px 8px; outline: none; width: 100%;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent-primary); box-shadow: var(--glow-mint);
}
.form-select option { background: var(--bg-input); }
.form-textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-sm); }

.modal-actions {
  display: flex; gap: var(--gap-sm);
  justify-content: flex-end; margin-top: var(--gap-md);
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: var(--border-bright);
  color: var(--accent-primary); padding: 5px 14px;
  font-family: var(--font-display); font-size: .95rem;
  letter-spacing: 1px; cursor: pointer;
  transition: background var(--transition), box-shadow var(--transition);
}
.btn:hover { background: var(--accent-primary); color: var(--bg-void); box-shadow: var(--glow-mint); }
.btn-pink  { border-color: var(--accent-secondary); color: var(--accent-secondary); }
.btn-pink:hover  { background: var(--accent-secondary); color: var(--bg-void); box-shadow: var(--glow-pink); }
.btn-yellow { border-color: var(--accent-tertiary); color: var(--accent-tertiary); }
.btn-yellow:hover { background: var(--accent-tertiary); color: var(--bg-void); }
.btn-sm    { padding: 3px 10px; font-size: .82rem; }
.btn-danger { border-color: #ff3333; color: #ff3333; }
.btn-danger:hover { background: #ff3333; color: #fff; }

/* ============================================================
   TOAST
   ============================================================ */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg-card); border: var(--border-bright);
  box-shadow: var(--glow-mint); color: var(--accent-primary);
  font-family: var(--font-display); font-size: 1rem; letter-spacing: 1px;
  padding: 8px 16px; z-index: 9000;
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ============================================================
   STATS BAR
   ============================================================ */
#stats-bar {
  background: var(--bg-nav); border-bottom: var(--border-dim);
  padding: 5px var(--gap-lg);
  display: flex; gap: var(--gap-lg); align-items: center;
  font-size: .68rem; color: var(--text-muted); letter-spacing: 1px;
}
#stats-bar span { color: var(--accent-primary); font-family: var(--font-display); font-size: .9rem; }

/* search */
#search-input {
  margin-left: auto;
  background: var(--bg-input); border: var(--border-dim);
  color: var(--text-body); font-family: var(--font-body);
  font-size: .75rem; padding: 3px 8px; outline: none; width: 180px;
  transition: border-color var(--transition);
}
#search-input:focus { border-color: var(--accent-primary); }
#search-input::placeholder { color: var(--text-muted); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-brand">
    <h1>HOME_BASE<span class="blink">_</span></h1>
    <p>// retro app binder // v1.0</p>
  </div>
  <div class="header-right">
    <button class="btn btn-sm" onclick="openAddModal()">+ ADD APP</button>
    <button class="btn btn-sm btn-pink" onclick="resetToDefaults()">↺ DEFAULTS</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="tb-label">QUICK ADD:</span>
  <select class="tb-select" id="quick-add-select">
    <option value="">— select app to add —</option>
  </select>
  <button class="btn btn-sm" onclick="quickAdd()">+ ADD</button>
  <div class="tb-sep"></div>
  <span class="tb-label">SORT:</span>
  <select id="sort-select" onchange="renderGrid()">
    <option value="custom">CUSTOM</option>
    <option value="name">NAME A–Z</option>
    <option value="cat">CATEGORY</option>
    <option value="recent">RECENTLY ADDED</option>
  </select>
  <div class="tb-sep"></div>
  <span class="tb-label">FILTER:</span>
  <select id="filter-select" onchange="renderGrid()">
    <option value="all">ALL</option>
    <option value="writing">WRITING</option>
    <option value="media">MEDIA</option>
    <option value="creative">CREATIVE</option>
    <option value="utility">UTILITY</option>
    <option value="custom">CUSTOM</option>
  </select>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  APPS <span id="stat-total">0</span>
  &nbsp;·&nbsp;
  WRITING <span id="stat-writing">0</span>
  &nbsp;·&nbsp;
  MEDIA <span id="stat-media">0</span>
  &nbsp;·&nbsp;
  CREATIVE <span id="stat-creative">0</span>
  &nbsp;·&nbsp;
  UTILITY <span id="stat-utility">0</span>
  &nbsp;·&nbsp;
  CUSTOM <span id="stat-custom">0</span>
  <input type="text" id="search-input" placeholder="🔍 search apps..." oninput="renderGrid()">
</div>

<!-- BINDER RINGS -->
<div id="binder-rings">
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div><div class="ring"></div>
</div>

<!-- MAIN CONTENT -->
<div id="content">
  <div id="app-grid">
    <div id="empty-state">
      <span class="big">📂</span>
      <p>NO APPS IN BINDER.<br>USE "+ ADD APP" OR THE QUICK ADD DROPDOWN ABOVE.</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">ADD APP</h2>

    <div class="form-row">
      <label class="form-label">APP NAME *</label>
      <input type="text" class="form-input" id="f-name" placeholder="e.g. BLOG_FORGE">
    </div>

    <div class="form-row-2">
      <div class="form-row">
        <label class="form-label">ICON (emoji)</label>
        <input type="text" class="form-input" id="f-icon" placeholder="✏" maxlength="4">
      </div>
      <div class="form-row">
        <label class="form-label">VERSION</label>
        <input type="text" class="form-input" id="f-version" placeholder="v1.0" maxlength="12">
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">FILE PATH / URL *</label>
      <input type="text" class="form-input" id="f-path" placeholder="blog-editor.html">
      <span class="form-hint">Relative path like "blog-editor.html" or a full URL</span>
    </div>

    <div class="form-row">
      <label class="form-label">CATEGORY</label>
      <select class="form-select" id="f-cat">
        <option value="writing">WRITING</option>
        <option value="media">MEDIA</option>
        <option value="creative">CREATIVE</option>
        <option value="utility">UTILITY</option>
        <option value="custom">CUSTOM</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">DESCRIPTION</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What does this app do?"></textarea>
    </div>

    <div class="form-row">
      <label class="form-label">TAGS <span style="font-size:.7rem;color:var(--text-muted);">(comma separated)</span></label>
      <input type="text" class="form-input" id="f-tags" placeholder="markdown, editor, export...">
    </div>

    <div class="form-row">
      <label class="form-label">KEYBOARD SHORTCUTS</label>
      <input type="text" class="form-input" id="f-keys" placeholder="Ctrl+S save · Space play...">
    </div>

    <div class="modal-actions">
      <button class="btn btn-sm btn-danger" id="modal-del-btn" onclick="deleteCurrentEdit()" style="display:none; margin-right:auto;">✕ REMOVE</button>
      <button class="btn btn-sm" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-sm" onclick="saveModal()">SAVE</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// DEFAULT APPS
// ============================================================
const DEFAULT_APPS = [
  {
    id: 'blog-editor',
    name: 'BLOG_FORGE',
    icon: '✏',
    version: 'v1.0',
    path: 'blog-editor.html',
    cat: 'writing',
    desc: 'Retro HTML blog post editor. Write in Markdown, preview in split-screen, export fully self-contained HTML files with your CSS baked in.',
    tags: ['markdown', 'blog', 'export', 'html'],
    keys: 'Ctrl+S save · Ctrl+N new · Ctrl+P preview',
    addedAt: 1,
  },
  {
    id: 'note-vault',
    name: 'NOTE_VAULT',
    icon: '📝',
    version: 'v1.0',
    path: 'note-vault.html',

// Catalogue of known apps for the quick-add dropdown
const KNOWN_APPS = [
  { id: 'blog-editor',   name: 'BLOG_FORGE',      path: 'blog-editor.html' },
  { id: 'note-vault',    name: 'NOTE_VAULT',       path: 'note-vault.html' },
  { id: 'task-terminal', name: 'TASK_TERMINAL',    path: 'task-terminal.html' },
  { id: 'media-station', name: 'MEDIA_STATION',    path: 'media-station.html' },
  { id: 'pixel-forge',   name: 'PIXEL_FORGE',      path: 'pixel-forge.html' },
  { id: 'palette-lab',   name: 'PALETTE_LAB',      path: 'palette-lab.html' },
  { id: 'photo-converter', name: 'PHOTO_CONVERT', path: 'photo-converter.html' },
  { id: 'dungeon-crawler', name: 'GRIMVEIL',      path: 'dungeon-crawler.html' },
];

// ============================================================
// STATE
// ============================================================
let apps    = JSON.parse(localStorage.getItem('hb_apps') || 'null') || JSON.parse(JSON.stringify(DEFAULT_APPS));
let editId  = null;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  buildQuickAddDropdown();
  renderGrid();
  // close modal on backdrop click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  // Escape closes modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter'
        && document.getElementById('modal-overlay').classList.contains('open')) {
      e.preventDefault(); saveModal();
    }
  });
});

// ============================================================
// QUICK-ADD DROPDOWN
// ============================================================
function buildQuickAddDropdown() {
  const sel = document.getElementById('quick-add-select');
  // Show only apps not already in binder
  const existingIds = apps.map(a => a.id);
  const available   = KNOWN_APPS.filter(k => !existingIds.includes(k.id));
  sel.innerHTML = '<option value="">— select app to add —</option>';
  if (!available.length) {
    sel.innerHTML += '<option value="" disabled>All known apps already added</option>';
    return;
  }
  available.forEach(k => {
    sel.innerHTML += `<option value="${k.id}">${k.name} (${k.path})</option>`;
  });
}

function quickAdd() {
  const sel = document.getElementById('quick-add-select');
  const id  = sel.value;
  if (!id) { showToast('SELECT AN APP FIRST'); return; }
  // Find default config for this id
  const defaults = DEFAULT_APPS.find(d => d.id === id);
  if (!defaults) { showToast('UNKNOWN APP'); return; }
  // Clone and re-add
  const clone = JSON.parse(JSON.stringify(defaults));
  clone.addedAt = Date.now();
  apps.push(clone);
  save();
  renderGrid();
  buildQuickAddDropdown();
  showToast(clone.name + ' ADDED');
  sel.value = '';
}

// ============================================================
// RENDER
// ============================================================
function renderGrid() {
  const grid      = document.getElementById('app-grid');
  const empty     = document.getElementById('empty-state');
  const q         = (document.getElementById('search-input').value || '').toLowerCase();
  const filterCat = document.getElementById('filter-select').value;
  const sortBy    = document.getElementById('sort-select').value;

  // Filter
  let list = apps.filter(a => {
    if (filterCat !== 'all' && a.cat !== filterCat) return false;
    if (!q) return true;
    return (
      (a.name  || '').toLowerCase().includes(q) ||
      (a.desc  || '').toLowerCase().includes(q) ||
      (a.tags  || []).some(t => t.toLowerCase().includes(q))
    );
  });

  // Sort
  if (sortBy === 'name') list = [...list].sort((a, b) => a.name.localeCompare(b.name));
  else if (sortBy === 'cat') list = [...list].sort((a, b) => a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));
  else if (sortBy === 'recent') list = [...list].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  // 'custom' = insertion order (default)

  // Clear and repopulate
  grid.innerHTML = '';

  if (!list.length) {
    grid.appendChild(empty);
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.forEach(app => {
      grid.insertAdjacentHTML('beforeend', buildCard(app));
    });
  }

  updateStats();
}

function buildCard(a) {
  const tagsHtml  = (a.tags || []).map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('');
  const badgeClass = `badge-${a.cat}`;
  const catLabel   = (a.cat || 'custom').toUpperCase();

  return `
    <div class="app-card" data-cat="${escHtml(a.cat)}" data-id="${escHtml(a.id)}">
      <div class="card-head">
        <div class="card-icon">${escHtml(a.icon || '📄')}</div>
        <div class="card-title-area">
          <div class="card-name">${escHtml(a.name)}</div>
          <div class="card-version">${escHtml(a.version || '')}</div>
        </div>
        <span class="card-cat-badge ${badgeClass}">${catLabel}</span>
      </div>

      <div class="card-body">
        <div class="card-desc">${escHtml(a.desc || 'No description.')}</div>
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        ${a.keys ? `<div style="margin-top:8px;font-size:.62rem;color:var(--accent-dim);letter-spacing:.5px;line-height:1.6;">${escHtml(a.keys)}</div>` : ''}
      </div>

      <div class="card-foot">
        <span class="card-path" title="${escHtml(a.path)}">${escHtml(a.path)}</span>
        <div class="card-actions">
          <button class="card-icon-btn" onclick="openEditModal('${escHtml(a.id)}')" title="Edit">✎</button>
          <button class="card-icon-btn del" onclick="confirmDelete('${escHtml(a.id)}')" title="Remove">✕</button>
        </div>
        <a class="card-launch" href="${escHtml(a.path)}" target="_blank" rel="noopener">▶ OPEN</a>
      </div>
    </div>`;
}

function updateStats() {
  const counts = { writing: 0, media: 0, creative: 0, utility: 0, custom: 0 };
  apps.forEach(a => { if (counts[a.cat] !== undefined) counts[a.cat]++; });
  document.getElementById('stat-total').textContent   = apps.length;
  document.getElementById('stat-writing').textContent  = counts.writing;
  document.getElementById('stat-media').textContent    = counts.media;
  document.getElementById('stat-creative').textContent = counts.creative;
  document.getElementById('stat-utility').textContent  = counts.utility;
  document.getElementById('stat-custom').textContent   = counts.custom;
}

// ============================================================
// MODAL — ADD / EDIT
// ============================================================
function openAddModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'ADD APP';
  clearForm();
  document.getElementById('modal-del-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function openEditModal(id) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'EDIT APP';
  document.getElementById('f-name').value    = app.name    || '';
  document.getElementById('f-icon').value    = app.icon    || '';
  document.getElementById('f-version').value = app.version || '';
  document.getElementById('f-path').value    = app.path    || '';
  document.getElementById('f-cat').value     = app.cat     || 'custom';
  document.getElementById('f-desc').value    = app.desc    || '';
  document.getElementById('f-tags').value    = (app.tags   || []).join(', ');
  document.getElementById('f-keys').value    = app.keys    || '';
  document.getElementById('modal-del-btn').style.display = 'inline-flex';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function clearForm() {
  ['f-name','f-icon','f-version','f-path','f-desc','f-tags','f-keys'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-cat').value = 'custom';
}

function saveModal() {
  const name = document.getElementById('f-name').value.trim();
  const path = document.getElementById('f-path').value.trim();
  if (!name || !path) { showToast('NAME AND PATH ARE REQUIRED'); return; }

  const tagsRaw = document.getElementById('f-tags').value;
  const tagList = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  if (editId) {
    const idx = apps.findIndex(a => a.id === editId);
    if (idx >= 0) {
      apps[idx] = {
        ...apps[idx],
        name:    document.getElementById('f-name').value.trim(),
        icon:    document.getElementById('f-icon').value.trim() || '📄',
        version: document.getElementById('f-version').value.trim(),
        path,
        cat:     document.getElementById('f-cat').value,
        desc:    document.getElementById('f-desc').value.trim(),
        tags:    tagList,
        keys:    document.getElementById('f-keys').value.trim(),
      };
    }
    showToast('APP UPDATED');
  } else {
    const newApp = {
      id:      'custom_' + Date.now(),
      name:    document.getElementById('f-name').value.trim(),
      icon:    document.getElementById('f-icon').value.trim() || '📄',
      version: document.getElementById('f-version').value.trim(),
      path,
      cat:     document.getElementById('f-cat').value,
      desc:    document.getElementById('f-desc').value.trim(),
      tags:    tagList,
      keys:    document.getElementById('f-keys').value.trim(),
      addedAt: Date.now(),
    };
    apps.push(newApp);
    showToast('APP ADDED');
  }

  save();
  renderGrid();
  buildQuickAddDropdown();
  closeModal();
}

function deleteCurrentEdit() {
  if (!editId) return;
  confirmDelete(editId);
  closeModal();
}

function confirmDelete(id) {
  const app = apps.find(a => a.id === id);
  if (!app) return;
  if (!confirm(`Remove "${app.name}" from binder?`)) return;
  apps = apps.filter(a => a.id !== id);
  save();
  renderGrid();
  buildQuickAddDropdown();
  showToast('APP REMOVED');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

// ============================================================
// DEFAULTS
// ============================================================
function resetToDefaults() {
  if (!confirm('Reset binder to the 6 default apps? All custom entries will be lost.')) return;
  apps = JSON.parse(JSON.stringify(DEFAULT_APPS));
  save();
  renderGrid();
  buildQuickAddDropdown();
  showToast('RESET TO DEFAULTS');
}

// ============================================================
// STORAGE
// ============================================================
function save() { localStorage.setItem('hb_apps', JSON.stringify(apps)); }

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
